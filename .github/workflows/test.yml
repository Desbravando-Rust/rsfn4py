name: Run Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust unit tests (debug)
        shell: bash
        run: |
          cargo test --verbose

      - name: Run Rust unit tests (release)
        shell: bash
        run: |
          cargo test --release --verbose

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Create Virtual Environment and Install Dependencies
        shell: bash
        run: |
          python -m venv .venv
          
          # Habilita o VENV local baseando-se no SO
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          
          # Instala dependências e build system
          python -m pip install --upgrade pip
          pip install pytest maturin

      - name: Build Rust Extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          # maturin develop constrói os bindings e instala silenciosamente no site-packages do VENV
          maturin develop --release

      - name: Run Pytest
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          # Roda os testes na pasta "tests"
          pytest -v -x tests/